services:
  reqres_integration.api_client:
    class: Drupal\reqres_integration\Service\ApiClient
    arguments: [ '@http_client', '@logger.channel.reqres_integration', '@state', '@event_dispatcher' ]

  reqres_integration.lazy_builder:
    class: Drupal\reqres_integration\LazyBuilder\ApiPagerLazyBuilder
    arguments: [ '@reqres_integration.api_client', '@pager.manager', '@logger.channel.reqres_integration', '@request_stack' ]

  logger.channel.reqres_integration:
    parent: logger.channel_base
    arguments: [ 'reqres_integration' ]
